<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Carrito - Sharingan Comics</title>
    <link rel="icon" href="assets/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css"> 
    <link rel="stylesheet" href="assets/css/cart.css"> 
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg fixed-top custom-navbar">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="./index.html">
                    <img src="assets/img/logo.png" alt="Logo" class="navbar-logo">
                    <span class="d-none d-lg-inline ms-2 navbar-brand-text">Sharingan Comics</span>
                </a>
                <form class="d-flex mx-3 flex-grow-1">
                    <input class="form-control me-2" type="search" placeholder="Buscar" aria-label="Buscar" id="searchInput">
                </form>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="./mangas.html">Mangas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Marvel</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="cart-page-content mt-5 pt-4">
        <div class="top-info-bar py-1 px-3 text-muted text-center border-bottom">
            <small><i class="fas fa-lock me-1"></i> Todos los datos están protegidos</small>
        </div>

        <div class="container mt-4">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Inicio</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Carrito</li>
                </ol>
            </nav>

            

            <div class="row">
               
                <div class="col-lg-8">
                    <div class="card p-3 mb-4 cart-items-card">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="selectAllCheckbox">
                                <label class="form-check-label" for="selectAllCheckbox">Seleccionar todo</label>
                            </div>
                            <i class="fas fa-list-ul text-muted fs-5"></i>
                        </div>
                        <ul id="cart-list-items" class="list-group cart-items-list mb-3">
                            
                        </ul>
                        <button id="clear-cart-button" class="btn btn-outline-danger btn-sm mt-2 w-auto">Vaciar Carrito</button>
                    </div>
                </div>

                
                <div class="col-lg-4">
                    <div class="card p-3 mb-4 cart-summary-card">
                        <h5 class="mb-3">Resumen del pedido</h5>
                        <div class="summary-details">
                            <div class="d-flex justify-content-between py-1">
                                <span class="text-muted">Total de artículos:</span>
                                <span id="summary-total-items">$0</span>
                            </div>
                            <div class="d-flex justify-content-between py-1">
                                <span class="text-muted">Descuentos:</span>
                                <span>-$0</span>
                            </div>
                            <hr class="my-2">
                            <div class="d-flex justify-content-between fw-bold py-2 fs-5">
                                <span>Total:</span>
                                <span id="summary-total-price">$0</span>
                            </div>
                        </div>

                        
                        <form id="cart-form" class="mt-3">
                            <div class="mb-3">
                                <label for="phone" class="form-label">Teléfono de contacto para entrega <span class="text-danger">*</span></label>
                                <input type="tel" class="form-control" id="phone" name="phone" placeholder="+56 9 1234 5678">
                                <div class="invalid-feedback phone-error"></div>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="termsCheckbox" name="termsCheckbox">
                                <label class="form-check-label" for="termsCheckbox">Acepto los <a href="#">términos y condiciones</a></label>
                                <div class="invalid-feedback terms-error"></div>
                            </div>
                            <div class="d-grid gap-3 mt-4 checkout-btns">
                                <button type="submit" id="submit-cart-btn" class="btn btn-primary w-100">Finalizar compra</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-4">
        <div class="container">
            <p>© 2024 Sharingan Comic Store. Todos los derechos reservados.</p>
            <p><a class="text-white" href="#">Contacto</a></p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/cards.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/session.js"></script>
    <script src="assets/js/cart.js"></script> 
    
    <script src="assets/js/vista_carrito_validacion.js"></script> 
</body>
</html>
