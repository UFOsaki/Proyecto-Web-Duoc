<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sharingan Comics</title>
    <link rel="icon" href="assets/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="./index.html">
            <img src="assets/img/logo.png" alt="Logo" class="navbar-logo">
            <span class="d-none d-lg-inline ms-2 navbar-brand-text">Sharingan Comics</span>
        </a>
        <h2 class="form-title">Iniciar sesión</h2>
        <form id="login-form">
            <div class="mb-3">
                <label for="username" class="form-label">Correo Electrónico</label>
                <input type="text" id="username" name="username" class="form-control"
                    placeholder="Ingresa tú Correo Electrónico">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Ingresa tú Contraseña">
            </div>
            <button type="submit" class="btn btn-primary">
                Iniciar Sesión
            </button>
            </button>
            <div class="form-footer">
                <p>¿No tienes cuenta? <a href="signup.html">
                    Regístrate</a></p>
            </div>
        </form>
    </div>
    <script type="module" src="assets/js/login.js"></script>
</body>

</html>
