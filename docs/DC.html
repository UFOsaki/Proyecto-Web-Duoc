<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC Comics | Sharingan Comics</title>
    <meta name="description" content="Catálogo de cómics DC en Sharingan Comics — Batman, Superman, Wonder Woman y más.">
    <link rel="icon" href="assets/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg fixed-top custom-navbar">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="./index.html">
                    <img src="assets/img/logo.png" alt="Logo" class="navbar-logo">
                    <span class="d-lg-inline ms-2 navbar-brand-text">Sharingan Comics</span>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <form class="d-flex my-2 my-lg-0 me-lg-3" id="navbar-search">
                        <input class="form-control" type="search" placeholder="Buscar" aria-label="Buscar"
                            id="searchInput">
                    </form>

                    <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="navbar-categories">
                        <li class="nav-item">
                            <a class="nav-link" href="./mangas.html">Mangas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="./DC.html">DC</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./marvel.html">Marvel</a>
                        </li>
                    </ul>

                    <div id="navbar-session-actions" class="d-flex flex-column flex-lg-row gap-2 mt-2 mt-lg-0">
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="container mt-5 pt-4">
        <h1 class="mb-4">DC Comics</h1>
        <div class="row" id="cards-container">
            <!-- Las tarjetas se cargarán dinámicamente -->
            <div class="col-12 text-center py-5">
                <p class="text-muted">Catálogo de DC Comics próximamente disponible.</p>
            </div>
        </div>
    </div>

    <!-- Carrito Offcanvas -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="cartOffcanvasLabel">Carrito de Compras</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <ul id="cart-items" class="list-group mb-3"></ul>
            <h5>Total: $<span id="cart-total">0</span></h5>
            <button id="checkout-button" class="btn btn-primary">Comprar</button>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-4">
        <div class="container">
            <p>© 2024 Sharingan Comic Store. Todos los derechos reservados.</p>
            <p><a class="text-white" href="./contacto.html">Contacto</a></p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/JS/config.js"></script>
    <script src="assets/JS/catalogConfig.js"></script>
    <script src="assets/JS/session.js"></script>
    <script src="assets/JS/cart.js"></script>
</body>
</html>
