<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up | Sharingan Comics</title>
    <link rel="icon" href="assets/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilo inicial -->
    <link rel="stylesheet" href="assets/css/login.css">
    <!-- Estilo formulario de registro -->
    <link rel="stylesheet" href="assets/css/signup.css">
</head>

<body>
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="./index.html">
            <img src="assets/img/logo.png" alt="Logo" class="navbar-logo">
            <span class="d-none d-lg-inline ms-2 navbar-brand-text">Sharingan Comics</span>
        </a>
        <form id="signup-form">
            <div class="step" id="step-1">
                <div class="mb-3">
                    <label for="username" class="form-label">Nombre de Usuario</label>
                    <input type="text" id="username" name="username" class="form-control"
                        placeholder="Ingresa tú nombre de usuario">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" id="email" name="email" class="form-control"
                        placeholder="Ingresa tú correo electrónico">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">
                        Contraseña
                    </label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Ingresa tú contraseña">
                </div>
                <div class="mb-3">
                    <label for="confirm-password" class="form-label">
                        Confirmar Contraseña
                    </label>
                    <input type="password" id="confirm-password" name="confirm-password" class="form-control"
                        placeholder="Confirma tú contraseña">
                </div>
                <button type="submit" class="btn btn-primary" id="next-step-1">
                    Crear Cuenta
                </button>
            </div>
            <div class="form-footer">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/JS/config.js"></script>
    <script src="assets/JS/signup.js"></script>
</body>

</html>
