spring:
  application:
    name: sharingan-comics

  datasource:
    url: jdbc:oracle:thin:@${ORACLE_DB_TNS_ALIAS:sharingan_medium}?TNS_ADMIN=${TNS_ADMIN:C:/Workspace/oracle-wallet}
    username: ${ORACLE_DB_USERNAME:ADMIN}
    password: ${ORACLE_DB_PASSWORD:Integracion123}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      minimum-idle: 1
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  web:
    resources:
      static-locations: classpath:/static/

server:
  port: 8080

# ─── JWT Local ─────────────────────────────────────────────────────────────────
# Autenticación propia (en convivencia temporal con Clerk)
app:
  jwt:
    secret: ${JWT_SECRET:sharingan-comics-dev-secret-key-change-in-production-min-256-bits-long}
    expiration-ms: 86400000  # 24 horas

# ─── Mercado Pago ──────────────────────────────────────────────────────────────
mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN:}
  success-url: ${MP_SUCCESS_URL:http://localhost:8080/payment-success.html}
  failure-url: ${MP_FAILURE_URL:http://localhost:8080/payment-failure.html}
  pending-url: ${MP_PENDING_URL:http://localhost:8080/payment-pending.html}
  notification-url: ${MP_NOTIFICATION_URL:}

# ─── Clerk (Integración de identidad externa con 2FA/MFA) ─────────────────────
# Frontend API derivada de la publishable key:
#   pk_test_dGVuZGVyLWNvcmFsLTEzLmNsZXJrLmFjY291bnRzLmRldiQ
#   → decode base64 → tender-coral-13.clerk.accounts.dev
#
# Configuración del Dashboard: https://dashboard.clerk.com
#
# CLERK_SECRET_KEY: NUNCA poner aquí — solo via variable de entorno
# Cumplimiento: ISO 27001 A.9.4.3, Ley 21.459
clerk:
  enabled: ${CLERK_ENABLED:true}
  issuer: ${CLERK_ISSUER:https://tender-coral-13.clerk.accounts.dev}
  jwks-url: ${CLERK_JWKS_URL:https://tender-coral-13.clerk.accounts.dev/.well-known/jwks.json}
  secret-key: ${CLERK_SECRET_KEY:}
