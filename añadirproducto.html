<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg fixed-top custom-navbar">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="./index.html">
                    <img src="assets/img/logo.png" alt="Logo" class="navbar-logo">
                    <span class="d-none d-lg-inline ms-2 navbar-brand-text">Sharingan Comics</span>
                </a>
            </div>
        </nav>
    </header>

<div class="form-productos">

    <h2>Agregar Producto</h2>

    <form>

        <div class="grupo">
            <label>Nombre del producto</label>
            <input type="text" placeholder="Ingrese nombre">
        </div>

        <div class="grupo">
            <label>Descripción</label>
            <textarea placeholder="Ingrese descripción"></textarea>
        </div>

        <div class="grupo">
            <label>Stock</label>
            <input type="number" placeholder="Cantidad disponible">
        </div>

        <div class="grupo">
            <label>Imagen del producto</label>
            <input type="file">
        </div>

        <div class="botones">
            <button type="submit" class="btn-agregar">
                Añadir Producto
            </button>

            <button type="button" class="btn-eliminar">
                Eliminar Producto
            </button>
        </div>

    </form>

</div>

</body>
